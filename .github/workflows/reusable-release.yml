name: Reusable Release

on:
  workflow_call:
    inputs:
      runner:
        description: Runner to use
        type: string
        default: ubuntu-24.04-arm
      node-version:
        description: Node.js version
        type: string
        default: 'lts/*'
      monorepo:
        description: Use pnpm publish -r for monorepo publishing
        type: boolean
        default: false
      pre-build-command:
        description: Command to run before build (e.g. npx nuxi prepare)
        type: string
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm i

      - if: ${{ inputs.pre-build-command != '' }}
        run: ${{ inputs.pre-build-command }}

      - run: pnpm build

      - name: Detect prerelease tag
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ -(beta|rc|alpha) ]]; then
            DIST_TAG=$(echo "$TAG" | sed 's/.*-\(beta\|rc\|alpha\).*/\1/')
            echo "tag=--tag $DIST_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - if: ${{ inputs.monorepo }}
        run: pnpm publish -r --access public --no-git-checks --provenance ${{ steps.prerelease.outputs.tag }}

      - if: ${{ !inputs.monorepo }}
        run: pnpm publish --access public --no-git-checks --provenance ${{ steps.prerelease.outputs.tag }}
